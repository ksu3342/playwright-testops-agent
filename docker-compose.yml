services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      HEADLESS: "true"
      BASE_URL: "${BASE_URL:-http://localhost:3000}"
      PLAYWRIGHT_BROWSER: "${PLAYWRIGHT_BROWSER:-chromium}"
      LLM_PROVIDER: "${LLM_PROVIDER:-mock}"
      LLM_LIVE_BASE_URL: "${LLM_LIVE_BASE_URL:-}"
      LLM_LIVE_MODEL: "${LLM_LIVE_MODEL:-}"
      LLM_LIVE_API_KEY: "${LLM_LIVE_API_KEY:-}"
    volumes:
      - ./data:/app/data
      - ./generated:/app/generated
