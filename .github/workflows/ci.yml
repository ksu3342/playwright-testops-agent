name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        run: python -m pip install -r requirements-core.txt

      - name: Install e2e dependencies
        run: python -m pip install -r requirements-e2e.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run demo app tests
        run: python -m pytest tests/demo/test_demo_app.py -q

      - name: Run unit tests
        run: python -m pytest tests/unit/test_generator.py tests/unit/test_runner.py tests/unit/test_selector_contract.py tests/unit/test_reporter.py -q

      - name: Run integration tests
        run: python -m pytest tests/integration/test_pipeline.py tests/integration/test_api.py -q

      - name: Run RAG retrieval evals
        run: python -m pytest tests/evals/test_rag_retrieval_quality.py -q

      - name: Run Agent golden demo
        run: python -m pytest tests/integration/test_agent_golden_demo.py -q

      - name: Generate login test
        run: python -m app.main generate --input data/inputs/sample_prd_login.md

      - name: Run generated login test
        run: python -m pytest generated/tests/test_login_generated.py -q

      - name: Run generated login test via CLI
        run: python -m app.main run generated/tests/test_login_generated.py
